<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jasmin | Contact</title>
  <meta name="description" content="Contact Jasmin through the portfolio form.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="subpage">
  <main class="desktop-page">
    <div class="container">
      <header class="hero-window tab-window">
        <div class="tab-bar">
          <span>home.tab</span>
          <span class="tab-close" aria-hidden="true">x</span>
        </div>
        <div class="hero-content">
          <p class="eyebrow">Portfolio</p>
          <h1 class="pixel-title">Visual Designer + AI Builder</h1>
          <p class="hero-text">
            Hi, I am Jasmin. I study at the University of Waterloo and I enjoy combining visual design with practical AI-powered coding projects.
          </p>
          <div class="decorative-text" aria-hidden="true">+ // [] +</div>
        </div>
        <a class="home-return-link" href="index.html" aria-label="Back to main home page">
          <img class="home-return-cursor" src="images/cursor.png" alt="" aria-hidden="true">
          <span class="home-return-text">back to home</span>
        </a>
      </header>

      <section class="folder-row" aria-label="Section folders">
        <a class="folder-link home-folder-link" href="index.html" aria-label="Back to home page">
          <img class="folder-icon home-folder-icon" src="images/cursor.png" alt="" aria-hidden="true">
          <span>home</span>
        </a>
        <a class="folder-link" href="about.html">
          <img class="folder-icon" src="images/folder.png" alt="" aria-hidden="true">
          <span>about</span>
        </a>
        <a class="folder-link" href="projects.html">
          <img class="folder-icon" src="images/folder.png" alt="" aria-hidden="true">
          <span>projects</span>
        </a>
        <a class="folder-link is-active" href="contact.html">
          <img class="folder-icon" src="images/folder.png" alt="" aria-hidden="true">
          <span>contact</span>
        </a>
      </section>

      <section class="content-panel tab-window">
        <div class="tab-bar"><span>contact.tab</span><span class="tab-close" aria-hidden="true">x</span></div>
        <div class="hero-content">
          <h2>+ Contact</h2>
          <form class="contact-form" action="mailto:jasmin@example.com" method="post" enctype="text/plain">
            <div class="form-row two-col">
              <label>
                Name
                <input type="text" name="name" placeholder="Your name" required>
              </label>
              <label>
                Email
                <input type="email" name="email" placeholder="you@example.com" required>
              </label>
            </div>
            <div class="form-row">
              <label>
                Subject
                <input type="text" name="subject" placeholder="How can I help?" required>
              </label>
            </div>
            <div class="form-row">
              <label>
                Message
                <textarea name="message" rows="6" placeholder="Write your message here..." required></textarea>
              </label>
            </div>
            <div class="form-row">
              <button class="submit-btn" type="submit">Submit</button>
            </div>
          </form>
        </div>
      </section>

      <section class="decorative-icons" aria-hidden="true">
        <img class="deco deco-mouse" src="images/mouse.png" alt="">
        <img class="deco deco-pointer" src="images/pointer.png" alt="">
        <img class="deco deco-sunglasses" src="images/sunglasses.png" alt="">
        <img class="deco deco-typing" src="images/typing.png" alt="">
      </section>

      <footer class="site-footer">
        <p>© <span id="year"></span> Jasmin. Built with love.</p>
      </footer>
    </div>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
